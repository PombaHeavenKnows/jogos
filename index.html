<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Adivinhe o Número</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="nemamo.css">
</head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

  <header class="text-center p-3 bg-dark text-white">
    <h1> Jogo: Adivinhe o Número</h1>
  </header>

  <main class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card shadow p-4 text-center caixa-jogo">

      <h2 class="mb-3">Adivinhe o Número</h2>

      <p id="dica">Escolha um número entre <strong>1 e 10</strong></p>
      <p class="text-warning">Você tem apenas 3 tentativas!</p>

      <input 
        type="number" 
        id="palpite" 
        class="form-control mb-3" 
        placeholder="Digite seu palpite"
        min="1"
        max="10"
      >

      <div class="d-flex justify-content-center gap-2">
        <button class="btn btn-success px-4" onclick="verificar()">Tentar</button>
        <button class="btn btn-danger px-4" onclick="reiniciar()">Reiniciar</button>
      </div>

      <p id="mensagem" class="fw-bold mt-3"></p>

    </div>

  </main>

  <footer class="text-center p-3 bg-dark text-white">
    <p>© 2026 - Jogo de Adivinhação</p>
  </footer>

  <script src="num.js"></script>

</body>
</html>
